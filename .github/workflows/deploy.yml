name: Deploy AUBEPINES

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install & build client
        run: |
          cd client
          npm install
          npm run build
          cp -r dist ../server/public

      - name: Install server deps
        run: cd server && npm install

      - name: Restart
        run: pm2 restart aubepines
