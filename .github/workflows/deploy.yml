name: Deploy SENTYS

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PM2_APP_NAME: sentys
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
  REPOSITORY_URL: https://github.com/${{ github.repository }}.git

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate deploy path
        run: |
          if [ -z "$DEPLOY_PATH" ]; then
            echo "DEPLOY_PATH GitHub variable is not set."
            echo "Set Settings > Secrets and variables > Actions > Variables > DEPLOY_PATH"
            exit 1
          fi

      - name: Prepare host repository
        run: |
          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          if [ ! -d .git ]; then
            git init
          fi

          if git remote get-url origin > /dev/null 2>&1; then
            git remote set-url origin "$REPOSITORY_URL"
          else
            git remote add origin "$REPOSITORY_URL"
          fi

          git fetch --prune origin
          git reset --hard "$GITHUB_SHA"
          git clean -fdx \
            -e .env \
            -e .env.* \
            -e hls \
            -e recordings \
            -e server/recordings \
            -e venv

      - name: Stop application to free RAM for build
        run: pm2 stop "$PM2_APP_NAME" > /dev/null 2>&1 || true

      - name: Install & build client on host
        working-directory: ${{ vars.DEPLOY_PATH }}/client
        run: |
          npm ci
          npm run build

      - name: Record deployed version
        run: |
          printf '%s\n' "$GITHUB_SHA" > "$DEPLOY_PATH/.deploy-commit"
          printf '%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$DEPLOY_PATH/.deploy-time"
          cat > "$DEPLOY_PATH/client/dist/deploy-info.json" <<EOF
          {
            "commit": "$GITHUB_SHA",
            "runNumber": "$GITHUB_RUN_NUMBER",
            "deployedAtUtc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Install production server deps on host
        working-directory: ${{ vars.DEPLOY_PATH }}/server
        run: npm ci --omit=dev

      - name: Setup Python venv & AI dependencies
        run: |
          if [ ! -f "$DEPLOY_PATH/venv/bin/python" ]; then
            python3 -m venv "$DEPLOY_PATH/venv"
          fi
          "$DEPLOY_PATH/venv/bin/pip" install --quiet --upgrade pip
          "$DEPLOY_PATH/venv/bin/pip" install --quiet ultralytics opencv-python psycopg2-binary requests

      - name: Restart
        working-directory: ${{ vars.DEPLOY_PATH }}/server
        run: |
          pm2 delete "$PM2_APP_NAME" > /dev/null 2>&1 || true
          pm2 start "$DEPLOY_PATH/server/server.js" --name "$PM2_APP_NAME" --cwd "$DEPLOY_PATH/server"
          pm2 save
